<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Meaningful Naming -->
  <title>Instagram Profile Clone</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- External CSS -->
  <link href="style.css" rel="stylesheet">
</head>

<body>
  <div class="d-flex">

    <!-- Sidebar Component -->
    <aside class="sidebar p-3 d-flex flex-column">
      <h4 class="fw-bold mb-4">Instagram</h4>

      <nav class="d-flex flex-column gap-2">
        <a href="#">Home</a>
        <a href="#">Search</a>
        <a href="#">Explore</a>
        <a href="#">Reels</a>
        <a href="#">Messages</a>
        <a href="#">Notifications</a>
        <a href="#">Create</a>
        <a href="#">Profile</a>
      </nav>

      <div class="mt-auto pt-3">
        <a href="#">Lainnya</a><br>
        <a href="#">Juga dari Meta</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow-1 p-4">

      <!-- Profile Section -->
      <section class="d-flex align-items-center gap-4 mb-4" id="profile-section">
        <img src="images/profil.png" class="profile-pic" alt="Foto profil pengguna">

        <div>
          <div class="d-flex align-items-center gap-2 mb-2">
            <h5 class="mb-0" id="username"></h5>
            <button class="btn btn-outline-secondary btn-sm">Edit Profile</button>
            <button class="btn btn-outline-secondary btn-sm">Archive</button>
          </div>

          <div class="d-flex gap-3 mb-2">
            <span><b id="posts"></b> posts</span>
            <span><b id="followers"></b> followers</span>
            <span><b id="following"></b> following</span>
          </div>

          <p class="mb-0 fw-semibold" id="fullname"></p>
          <p class="text-muted mb-0" id="bio"></p>
        </div>
      </section>

      <!-- Feed Section -->
      <section class="row row-cols-3 g-2" id="feed-container"></section>

    </main>
  </div>

  <!-- Data (mengganti magic strings) -->
  <script>
    const profile = {
      username: "Manm_aaaa",
      posts: 12,
      followers: 167,
      following: 206,
      fullname: "mannn",
      bio: "saya saya\n- - - - -\niya iya"
    };

    const images = Array.from({ length: 12 }, (_, i) => i + 1);
  </script>

  <!-- Render Logic (menghindari DRY & nested condition) -->
  <script>
    // Profile Rendering
    document.getElementById("username").innerText = profile.username;
    document.getElementById("posts").innerText = profile.posts;
    document.getElementById("followers").innerText = profile.followers;
    document.getElementById("following").innerText = profile.following;
    document.getElementById("fullname").innerText = profile.fullname;
    document.getElementById("bio").innerText = profile.bio;

    // Feed Rendering (DRY)
    const feedContainer = document.getElementById("feed-container");

    images.forEach(num => {
      const col = document.createElement("div");
      col.className = "col";

      col.innerHTML = `
        <img src="images/${num}.jpg" 
             class="feed-img" 
             alt="Foto postingan ${num}">
      `;

      feedContainer.appendChild(col);
    });
  </script>

</body>
</html>
